version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gam_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gam
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: gam_dev_password
    ports:
      - '5432:5432'
    volumes:
      - gam_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: gam_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gam.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres
    volumes:
      - gam_pgadmin_data:/var/lib/pgadmin

volumes:
  gam_postgres_data:
  gam_pgadmin_data:
